name: Automated Preprocessing Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'preprocessing/**'
      - 'heart_raw/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      dataset_url:
        description: 'URL dataset (kosongkan untuk generate otomatis)'
        required: false
        default: ''

jobs:
  preprocessing:
    runs-on: ubuntu-latest
    name: Run Data Preprocessing (Step 1–8)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn matplotlib seaborn

      # ─── Siapkan raw dataset ──────────────────────────────────────
      - name: Prepare raw dataset
        run: |
          python - <<'EOF'
          import urllib.request, os, sys
          import numpy as np, pandas as pd

          url = "${{ github.event.inputs.dataset_url }}"
          os.makedirs("heart_raw", exist_ok=True)

          if url.strip():
              try:
                  urllib.request.urlretrieve(url, "heart_raw/heart_raw.csv")
                  df = pd.read_csv("heart_raw/heart_raw.csv")
                  print(f"Dataset diunduh dari URL: {df.shape}")
              except Exception as e:
                  print(f"Gagal unduh ({e}) — generate dataset representatif")
                  url = ""

          if not url.strip():
              np.random.seed(42)
              n = 303
              df = pd.DataFrame({
                  'age':      np.random.randint(29, 77, n),
                  'sex':      np.random.randint(0, 2, n),
                  'cp':       np.random.randint(0, 4, n),
                  'trestbps': np.random.randint(94, 200, n),
                  'chol':     np.random.randint(126, 564, n),
                  'fbs':      np.random.randint(0, 2, n),
                  'restecg':  np.random.randint(0, 3, n),
                  'thalach':  np.random.randint(71, 202, n),
                  'exang':    np.random.randint(0, 2, n),
                  'oldpeak':  np.round(np.random.uniform(0, 6.2, n), 1),
                  'slope':    np.random.randint(0, 3, n),
                  'ca':       np.random.randint(0, 5, n),
                  'thal':     np.random.randint(0, 4, n),
                  'target':   np.random.randint(0, 2, n)
              })
              df.to_csv("heart_raw/heart_raw.csv", index=False)
              print(f"Dataset representatif dibuat: {df.shape}")
          EOF

      # ─── Jalankan pipeline preprocessing (Step 1–8) ──────────────
      - name: Run automate_Student.py (Step 1–8)
        run: |
          python preprocessing/automate_Student.py \
            --input      heart_raw/heart_raw.csv \
            --output_dir heart_preprocessing \
            --target_col target

      # ─── Validasi output ──────────────────────────────────────────
      - name: Validate preprocessed output
        run: |
          python - <<'EOF'
          import pandas as pd, os, sys

          assert os.path.exists("heart_preprocessing/train.csv"), " train.csv tidak ditemukan!"
          assert os.path.exists("heart_preprocessing/test.csv"),  " test.csv tidak ditemukan!"

          train = pd.read_csv("heart_preprocessing/train.csv")
          test  = pd.read_csv("heart_preprocessing/test.csv")

          assert "target" in train.columns, " Kolom target tidak ada di train!"
          assert len(train) > 0,            " train.csv kosong!"
          assert len(test)  > 0,            " test.csv kosong!"

          # Pastikan fitur baru ada (hasil Step 4 Feature Engineering)
          assert "age_group"          in train.columns, " age_group tidak ada!"
          assert "chol_thalach_ratio" in train.columns, " chol_thalach_ratio tidak ada!"

          print(f" train.csv  : {train.shape}")
          print(f" test.csv   : {test.shape}")
          print(f" Kolom      : {list(train.columns)}")
          print(f" Validasi berhasil — dataset siap dilatih!")
          EOF

      # ─── Upload sebagai artifact GitHub ──────────────────────────
      - name: Upload preprocessed dataset as artifact
        uses: actions/upload-artifact@v4
        with:
          name: heart-preprocessed-${{ github.run_id }}
          path: |
            heart_preprocessing/train.csv
            heart_preprocessing/test.csv
          retention-days: 30

      # ─── Commit hasil kembali ke repo ────────────────────────────
      - name: Commit preprocessed data back to repository
        if: github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add heart_preprocessing/
          git diff --staged --quiet || \
            git commit -m "ci: update preprocessed dataset (Step 1-8) [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Summary ─────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "##  Preprocessing Pipeline Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tahapan yang dijalankan identik dengan **Eksperimen_Student.ipynb**:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Tahapan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | Handle Missing Values |  |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | Remove Duplicates |  |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | Handle Outliers (IQR) |  |" >> $GITHUB_STEP_SUMMARY
          echo "| 4 | Feature Engineering (Binning) |  |" >> $GITHUB_STEP_SUMMARY
          echo "| 5 | Encoding Kategorikal |  |" >> $GITHUB_STEP_SUMMARY
          echo "| 6 | Standarisasi (StandardScaler) |  |" >> $GITHUB_STEP_SUMMARY
          echo "| 7 | Train-Test Split |  |" >> $GITHUB_STEP_SUMMARY
          echo "| 8 | Simpan Preprocessed Data |  |" >> $GITHUB_STEP_SUMMARY
